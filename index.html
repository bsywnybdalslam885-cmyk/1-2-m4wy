<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>رغيف مشوي</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #fff1d6;
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        /* خلفية نارية */

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top right, rgba(255, 90, 0, .25), transparent 35%),
                radial-gradient(circle at top left, rgba(255, 120, 0, .15), transparent 30%),
                radial-gradient(circle at bottom left, rgba(255, 80, 0, .18), transparent 40%);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 550px;
            margin: auto;
            padding: 20px;
        }

        /* logo */

        .logo {
            width: 100%;
            max-width: 420px;
            display: block;
            margin: auto;
            filter:
                drop-shadow(0 0 20px rgba(255, 120, 0, .5)) drop-shadow(0 0 50px rgba(255, 80, 0, .25));
        }

        /* slogan */

        .slogan {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            margin-top: 15px;
            margin-bottom: 25px;
            color: #fff1d6;
        }

        /* buttons */

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;

            padding: 18px;

            margin-bottom: 18px;

            border-radius: 26px;

            text-decoration: none;

            color: white;

            transition: .25s;

            box-shadow:
                0 0 20px rgba(255, 100, 0, .25);
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .lefticon {
            width: 70px;
            height: 70px;

            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 30px;

            background: #0d0d0d;

            border: 2px solid rgba(255, 255, 255, .15);

        }

        .content {
            flex: 1;
            padding-right: 15px;
        }

        .content h2 {
            font-size: 34px;
            font-weight: 900;
        }

        .content p {
            font-size: 16px;
            opacity: .95;
        }

        .arrow {
            font-size: 28px;
        }

        .menu {
            background:
                linear-gradient(135deg,
                    #ff8a00,
                    #ff5e00);
        }

        .phone {
            background:
                linear-gradient(135deg,
                    #1a1a1a,
                    #000000);
            border: 1px solid rgba(255, 100, 0, .3);
        }

        .facebook {
            background:
                linear-gradient(135deg,
                    #1464d8,
                    #0b3e8d);
        }

        /* features */

        .features {
            margin-top: 30px;

            background:
                linear-gradient(180deg,
                    #e8d3ad,
                    #d9be8d);

            border-radius: 30px;

            padding: 25px 10px;

            display: grid;

            grid-template-columns:
                repeat(4, 1fr);

            gap: 10px;
        }

        .feature {
            text-align: center;
            color: #111;
        }

        .feature i {
            font-size: 42px;
            color: #ff6b00;
            margin-bottom: 12px;
        }

        .feature h3 {
            font-size: 16px;
            line-height: 1.3;
            font-weight: 900;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            padding-bottom: 30px;
            font-size: 14px;
            color: #bbb;
        }

        @media(max-width:500px) {

            .content h2 {
                font-size: 28px;
            }

            .content p {
                font-size: 14px;
            }

            .features {
                grid-template-columns:
                    repeat(2, 1fr);
            }

        }
    </style>
</head>

<body>

    <div class="container">

        <img src="photo.jpg" class="logo">

        <div class="slogan">
            سر التتبيلة والنار .. ف نص رغيف حار
        </div>

        <a class="btn menu" href="https://drive.google.com/drive/folders/1ukhV5bZFUp3hW5nJc8yLyifvjCtqX-Oh"
            target="_blank">

            <div class="lefticon">
                <i class="fa-solid fa-book-open"></i>
            </div>

            <div class="content">
                <h2>عرض المنيو</h2>
                <p>اطلع على جميع السندوتشات والمشروبات</p>
            </div>

            <div class="arrow">
                <i class="fa-solid fa-arrow-left"></i>
            </div>

        </a>

        <a class="btn phone" href="tel:01131212606">

            <div class="lefticon">
                <i class="fa-solid fa-phone"></i>
            </div>

            <div class="content">
                <h2>اطلب الآن</h2>
                <!-- <p>01131212606</p> -->
            </div>

            <div class="arrow">
                <i class="fa-solid fa-arrow-left"></i>
            </div>

        </a>

        <a class="btn facebook" href="https://www.facebook.com/share/1JB3Xd6zpm/" target="_blank">

            <div class="lefticon">
                <i class="fa-brands fa-facebook-f"></i>
            </div>

            <div class="content">
                <h2>صفحتنا على فيسبوك</h2>
                <p>تابعنا لكل العروض والأخبار</p>
            </div>

            <div class="arrow">
                <i class="fa-solid fa-arrow-left"></i>
            </div>

        </a>

        <div class="features">

            <div class="feature">
                <i class="fa-solid fa-bread-slice"></i>
                <h3>خبز طازج يومياً</h3>
            </div>

            <div class="feature">
                <i class="fa-solid fa-fire"></i>
                <h3>مشوي على الفحم</h3>
            </div>

            <div class="feature">
                <i class="fa-solid fa-pepper-hot"></i>
                <h3>تتبيلة خاصة</h3>
            </div>
            <div class="feature">
                <i class="fa-solid fa-stopwatch"></i>
                <h3>خدمة سريعة</h3>
            </div>

        </div>

        <div class="footer">
            © 
        </div> -->

    </div>

</body>

</html>
